# Alembic configuration. The sqlalchemy.url here is a placeholder —
# env.py always overrides it with settings.DATABASE_URL so migrations
# and the app can never point at different databases.
[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///./swasthya.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
