name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Migrations run cleanly (alembic on throwaway SQLite)
        env:
          DATABASE_URL: sqlite:////tmp/ci_migration.db
        run: alembic upgrade head
      - name: Tests (pytest)
        run: pytest -q

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build
        run: npm run build

  docker:
    name: Docker — image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t swasthyaai-backend:ci backend
      - name: Build frontend image
        run: docker build -t swasthyaai-frontend:ci frontend

  security:
    name: Security — dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (Python dependencies)
        # Report-only: a new upstream CVE should be visible, not block
        # every unrelated PR. Tighten to blocking once triage is routine.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: npm audit (frontend dependencies)
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high
