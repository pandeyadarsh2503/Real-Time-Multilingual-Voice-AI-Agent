# coturn TURN server for live WebRTC voice.
# Relays audio when a peer is behind symmetric NAT / a UDP-blocking firewall.
# Fill in the two placeholders and open UDP/TCP 3478, 5349, and 49160-49200.

# Replace with this host's PUBLIC IPv4.
external-ip=REPLACE_WITH_PUBLIC_IP

listening-port=3478
tls-listening-port=5349

# Narrow relay range (also publish it on the host firewall / security group).
min-port=49160
max-port=49200

# Long-term credentials — must match TURN_USERNAME / TURN_CREDENTIAL in .env
# (and VITE_TURN_USERNAME / VITE_TURN_CREDENTIAL for the browser).
lt-cred-mech
user=REPLACE_TURN_USER:REPLACE_TURN_PASSWORD
realm=swasthyaai

# Hardening
no-cli
no-multicast-peers
fingerprint

# For TLS (5349) point these at the same cert Caddy manages, or terminate
# TURN-over-TLS separately. Plain 3478 works for most users; 5349/TCP helps
# on the most restrictive corporate networks.
# cert=/path/to/fullchain.pem
# pkey=/path/to/privkey.pem
